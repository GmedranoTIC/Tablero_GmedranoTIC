<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tablero de GmedranoTIC</title>
<meta name="description" content="Tablero colaborativo temporal - GmedranoTIC"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --ink: #1a1512;
    --ink2: #3d3630;
    --paper: #faf7f2;
    --paper2: #f2ede4;
    --accent: #c8541a;
    --accent2: #e8762a;
    --gold: #d4a843;
    --teal: #2a7c6f;
    --border: rgba(26,21,18,0.12);
    --shadow: 0 4px 24px rgba(26,21,18,0.10);
    --r: 0px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;overflow-x:hidden;}

  /* ── LOBBY ──────────────────────────────── */
  #lobby{display:flex;flex-direction:column;min-height:100vh;background:var(--paper);background-image:radial-gradient(var(--ink) 0.8px,transparent 0.8px);background-size:22px 22px;background-position:0 0;}
  #lobby-inner{max-width:720px;margin:auto;padding:60px 20px 40px;display:flex;flex-direction:column;gap:40px;align-items:center;flex:1;}
  .logo-block{display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center;}
  .logo-svg{width:80px;height:80px;filter:drop-shadow(0 4px 12px rgba(200,84,26,0.3));}
  .logo-title{font-family:'Playfair Display',serif;font-size:clamp(28px,6vw,46px);font-weight:700;color:var(--ink);line-height:1.1;letter-spacing:-0.02em;}
  .logo-title span{color:var(--accent);font-style:italic;}
  .logo-sub{font-size:13px;color:var(--ink2);opacity:0.7;letter-spacing:0.08em;text-transform:uppercase;font-weight:500;}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border:1px solid var(--border);background:rgba(255,255,255,0.7);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;font-weight:600;color:var(--ink2);backdrop-filter:blur(8px);}

  .lobby-card{background:rgba(255,255,255,0.92);border:1px solid var(--border);padding:32px;box-shadow:var(--shadow);backdrop-filter:blur(8px);width:100%;}
  .lobby-card h2{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:20px;font-weight:700;display:flex;align-items:center;gap:8px;}
  .lobby-card h2 svg{width:18px;height:18px;color:var(--accent);flex-shrink:0;}
  label{display:block;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink2);margin-bottom:6px;opacity:0.7;}
  input[type=text],textarea{width:100%;padding:10px 14px;border:1px solid var(--border);background:var(--paper);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color .2s;resize:none;}
  input[type=text]:focus,textarea:focus{border-color:var(--accent);}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:520px){.field-row{grid-template-columns:1fr;}}
  .btn-primary{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:var(--ink);color:var(--paper);border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;}
  .btn-primary:hover{background:var(--accent);color:#fff;}
  .btn-primary svg{width:16px;height:16px;}

  .theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px;}
  @media(max-width:440px){.theme-grid{grid-template-columns:repeat(2,1fr);}}
  .theme-btn{height:64px;border:2px solid transparent;cursor:pointer;position:relative;overflow:hidden;transition:all .2s;display:flex;flex-direction:column;justify-content:flex-end;padding:6px;}
  .theme-btn.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent);}
  .theme-btn span{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;background:rgba(255,255,255,0.9);color:var(--ink);padding:2px 6px;line-height:1.6;width:fit-content;}
  .recents-list{display:flex;flex-direction:column;gap:8px;max-height:200px;overflow-y:auto;}
  .recent-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border:1px solid var(--border);background:var(--paper);cursor:pointer;transition:all .2s;}
  .recent-item:hover{background:var(--ink);color:var(--paper);}
  .recent-item .rname{font-size:13px;font-weight:600;truncate:ellipsis;}
  .recent-item .rbadge{font-size:9px;padding:2px 6px;background:var(--accent);color:#fff;font-weight:700;letter-spacing:0.08em;}
  .empty-recents{text-align:center;padding:24px;color:var(--ink2);opacity:0.5;font-size:13px;}

  /* ── BOARD APP ──────────────────────────── */
  #app{display:none;flex-direction:column;height:100vh;overflow:hidden;position:relative;}
  #app.active{display:flex;}

  /* HEADER */
  #board-header{background:rgba(250,247,242,0.97);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:12px;min-height:58px;flex-shrink:0;z-index:100;backdrop-filter:blur(12px);flex-wrap:wrap;}
  .hdr-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
  .hdr-logo svg{width:28px;height:28px;}
  .hdr-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;font-style:italic;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
  .hdr-badge{font-size:9px;font-weight:700;padding:2px 8px;border:1px solid currentColor;letter-spacing:0.1em;text-transform:uppercase;white-space:nowrap;}
  .hdr-badge.editor{color:var(--accent);border-color:var(--accent);}
  .hdr-badge.viewer{color:var(--ink2);border-color:var(--border);opacity:0.6;}
  .hdr-expiry{font-size:10px;font-family:'DM Mono',monospace;display:flex;align-items:center;gap:4px;color:var(--ink2);white-space:nowrap;}
  .hdr-expiry .dot{width:6px;height:6px;border-radius:50%;background:#e05;animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
  .hdr-spacer{flex:1;}
  .hdr-btns{display:flex;align-items:center;gap:6px;}
  .hdr-btn{display:flex;align-items:center;gap:5px;padding:7px 10px;border:1px solid var(--border);background:transparent;color:var(--ink);font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;white-space:nowrap;}
  .hdr-btn:hover{background:var(--ink);color:var(--paper);}
  .hdr-btn.accent{background:var(--accent);color:#fff;border-color:var(--accent);}
  .hdr-btn.accent:hover{background:var(--ink);}
  .hdr-btn svg{width:14px;height:14px;flex-shrink:0;}
  .layout-toggle{display:flex;border:1px solid var(--border);}
  .layout-toggle button{padding:7px 10px;background:transparent;border:none;cursor:pointer;color:var(--ink2);transition:all .2s;display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;}
  .layout-toggle button.active{background:var(--ink);color:var(--paper);}
  .layout-toggle button svg{width:13px;height:13px;}

  /* BOARD MAIN */
  #board-main{flex:1;overflow:auto;position:relative;transition:background .4s;}
  #board-content{min-height:100%;padding:24px;}
  /* Watermark */
  #board-main::after{content:'GmedranoTIC';position:fixed;bottom:40px;right:40px;font-family:'Playfair Display',serif;font-size:clamp(32px,5vw,56px);font-weight:700;font-style:italic;color:rgba(26,21,18,0.04);pointer-events:none;z-index:0;letter-spacing:-0.01em;white-space:nowrap;user-select:none;}

  /* CARDS GRID */
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px;align-items:start;}
  .cards-canvas{position:relative;min-height:70vh;}

  /* POST CARD */
  .post-card{border:1px solid var(--border);background:#fff;overflow:hidden;display:flex;flex-direction:column;transition:transform .2s,box-shadow .2s;position:relative;break-inside:avoid;}
  .post-card:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(26,21,18,0.12);}
  .post-card.canvas-mode{position:absolute;width:260px;cursor:grab;}
  .post-card.canvas-mode:active{cursor:grabbing;}
  .post-card.dragging{box-shadow:0 16px 48px rgba(26,21,18,0.2);transform:scale(1.02) rotate(0.5deg);z-index:999;}
  .card-top{padding:8px 12px 6px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(26,21,18,0.02);}
  .card-author{font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink2);opacity:0.7;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px;}
  .card-timer{display:flex;align-items:center;gap:4px;font-size:9.5px;font-family:'DM Mono',monospace;color:var(--ink2);opacity:0.6;white-space:nowrap;}
  .card-timer svg{width:11px;height:11px;animation:pulse 2s infinite;}
  .card-image{overflow:hidden;max-height:200px;display:flex;align-items:center;justify-content:center;background:var(--paper2);border-bottom:1px solid var(--border);cursor:zoom-in;position:relative;}
  .card-image img{width:100%;height:100%;object-fit:cover;max-height:200px;transition:transform .3s;}
  .card-image:hover img{transform:scale(1.04);}
  .card-image .zoom-hint{position:absolute;bottom:8px;right:8px;background:rgba(26,21,18,0.7);color:#fff;padding:4px 6px;font-size:9px;opacity:0;transition:opacity .2s;}
  .card-image:hover .zoom-hint{opacity:1;}
  .card-body{padding:14px;flex:1;}
  .card-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--ink);margin-bottom:6px;line-height:1.3;}
  .card-text{font-size:13px;color:var(--ink2);line-height:1.6;white-space:pre-wrap;word-break:break-word;}
  .card-footer{padding:8px 12px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(26,21,18,0.01);}
  .card-actions{display:flex;align-items:center;gap:2px;}
  .card-btn{background:none;border:none;cursor:pointer;padding:5px 7px;display:flex;align-items:center;gap:4px;font-size:11px;color:var(--ink2);opacity:0.6;transition:all .2s;}
  .card-btn:hover{opacity:1;color:var(--ink);}
  .card-btn svg{width:14px;height:14px;}
  .card-btn.liked{color:var(--accent);opacity:1;}
  .card-editor-btns{display:flex;align-items:center;gap:2px;opacity:0.5;transition:opacity .2s;}
  .post-card:hover .card-editor-btns{opacity:1;}
  .card-editor-btn{background:none;border:none;cursor:pointer;padding:5px;display:flex;align-items:center;color:var(--ink2);transition:all .2s;}
  .card-editor-btn:hover{color:var(--ink);}
  .card-editor-btn.del:hover{color:#d00;}
  .card-editor-btn svg{width:13px;height:13px;}

  /* COMMENTS */
  .comments-panel{border-top:1px solid var(--border);background:rgba(26,21,18,0.015);}
  .comments-list{max-height:130px;overflow-y:auto;padding:8px 12px;display:flex;flex-direction:column;gap:6px;border-bottom:1px solid var(--border);}
  .comment-item{background:#fff;padding:6px 9px;border:1px solid var(--border);}
  .comment-meta{display:flex;justify-content:space-between;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--ink2);margin-bottom:3px;}
  .comment-text{font-size:12px;color:var(--ink);line-height:1.5;}
  .comment-form{display:flex;padding:6px 8px;gap:6px;}
  .comment-form input{flex:1;padding:5px 9px;border:1px solid var(--border);background:var(--paper);font-family:'DM Sans',sans-serif;font-size:12px;outline:none;}
  .comment-form input:focus{border-color:var(--accent);}
  .comment-submit{padding:5px 10px;background:var(--ink);color:var(--paper);border:none;cursor:pointer;display:flex;align-items:center;transition:background .2s;}
  .comment-submit:hover{background:var(--accent);}
  .comment-submit svg{width:12px;height:12px;}

  /* EMPTY STATE */
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:55vh;text-align:center;gap:12px;}
  .empty-state svg{width:36px;height:36px;opacity:0.2;}
  .empty-state h3{font-family:'Playfair Display',serif;font-size:24px;font-style:italic;opacity:0.5;}
  .empty-state p{font-size:13px;opacity:0.45;max-width:320px;line-height:1.6;}
  .empty-state button{padding:10px 20px;background:var(--ink);color:var(--paper);border:none;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:background .2s;}
  .empty-state button:hover{background:var(--accent);}

  /* FAB */
  #fab{position:fixed;bottom:24px;right:24px;display:flex;align-items:center;gap:8px;padding:12px 20px;background:var(--ink);color:var(--paper);border:none;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;z-index:90;box-shadow:0 6px 24px rgba(26,21,18,0.3);transition:all .2s;}
  #fab:hover{background:var(--accent);}
  #fab svg{width:15px;height:15px;}

  /* MODAL OVERLAY */
  .modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(26,21,18,0.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal-box{background:var(--paper);border:1px solid var(--border);max-width:520px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(26,21,18,0.2);}
  .modal-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--paper);z-index:1;}
  .modal-header h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px;}
  .modal-header h3 svg{width:16px;height:16px;color:var(--accent);}
  .modal-close{background:none;border:none;cursor:pointer;padding:4px;color:var(--ink2);opacity:0.5;transition:opacity .2s;}
  .modal-close:hover{opacity:1;}
  .modal-close svg{width:18px;height:18px;}
  .modal-body{padding:20px;}
  .form-group{margin-bottom:16px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media(max-width:480px){.form-row{grid-template-columns:1fr;}}
  .form-actions{display:flex;justify-content:flex-end;gap:8px;padding-top:16px;border-top:1px solid var(--border);margin-top:16px;}
  .btn-cancel{padding:9px 18px;background:transparent;border:1px solid var(--border);font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;color:var(--ink2);transition:all .2s;}
  .btn-cancel:hover{border-color:var(--ink);color:var(--ink);}
  .btn-save{padding:9px 18px;background:var(--ink);color:var(--paper);border:1px solid var(--ink);font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;}
  .btn-save:hover{background:var(--accent);border-color:var(--accent);}
  .btn-save svg{width:14px;height:14px;}

  /* COLOR PICKER */
  .color-picker{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
  .color-swatch{width:28px;height:28px;border:2px solid transparent;cursor:pointer;transition:all .2s;position:relative;}
  .color-swatch.active{border-color:var(--ink);box-shadow:0 0 0 2px var(--ink);}
  .color-swatch.active::after{content:'';position:absolute;inset:50%;transform:translate(-50%,-50%);width:6px;height:6px;background:rgba(255,255,255,0.8);border-radius:50%;}

  /* DROP ZONE */
  .drop-zone{border:2px dashed var(--border);padding:24px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
  .drop-zone.drag-over{border-color:var(--accent);background:rgba(200,84,26,0.04);}
  .drop-zone svg{width:28px;height:28px;opacity:0.35;margin:0 auto 8px;}
  .drop-zone p{font-size:12px;color:var(--ink2);opacity:0.7;}
  .drop-zone .formats{font-size:10px;font-family:'DM Mono',monospace;opacity:0.4;margin-top:4px;}
  .drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
  .img-preview{position:relative;max-height:160px;overflow:hidden;border:1px solid var(--border);}
  .img-preview img{width:100%;object-fit:cover;max-height:160px;}
  .img-remove{position:absolute;top:8px;right:8px;background:rgba(26,21,18,0.8);color:#fff;border:none;cursor:pointer;padding:4px;display:flex;align-items:center;transition:background .2s;}
  .img-remove:hover{background:var(--accent);}
  .img-remove svg{width:12px;height:12px;}
  .compressing{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px;color:var(--ink2);font-size:12px;}
  .spin{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--ink);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* SHARE MODAL */
  .share-tabs{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border);}
  .share-tab{padding:12px;background:none;border:none;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink2);border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;}
  .share-tab.active{color:var(--ink);border-bottom-color:var(--ink);}
  .share-tab svg{width:13px;height:13px;}
  .share-warning{padding:12px 14px;background:rgba(200,84,26,0.06);border:1px solid rgba(200,84,26,0.2);font-size:12px;color:var(--ink2);line-height:1.6;display:flex;gap:10px;align-items:flex-start;margin-bottom:16px;}
  .share-warning svg{width:14px;height:14px;color:var(--accent);flex-shrink:0;margin-top:1px;}
  .qr-box{display:flex;flex-direction:column;align-items:center;gap:10px;padding:16px;border:1px solid var(--border);background:#fff;margin-bottom:16px;}
  .qr-box img{width:180px;height:180px;}
  .qr-hint{font-size:10px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink2);opacity:0.5;}
  .link-copy-row{display:flex;gap:8px;}
  .link-input{flex:1;padding:9px 12px;border:1px solid var(--border);background:var(--paper2);font-family:'DM Mono',monospace;font-size:11px;color:var(--ink);outline:none;}
  .copy-btn{padding:9px 16px;background:var(--ink);color:var(--paper);border:none;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;white-space:nowrap;}
  .copy-btn:hover{background:var(--accent);}
  .copy-btn svg{width:13px;height:13px;}
  .copy-btn.copied{background:var(--teal);}

  /* ZOOM OVERLAY */
  #zoom-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.92);display:flex;align-items:center;justify-content:center;padding:20px;cursor:zoom-out;}
  #zoom-overlay img{max-width:100%;max-height:90vh;object-fit:contain;box-shadow:0 24px 80px rgba(0,0,0,0.5);}
  #zoom-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.15);border:none;color:#fff;cursor:pointer;padding:8px;display:flex;align-items:center;border-radius:50%;transition:background .2s;}
  #zoom-close:hover{background:rgba(255,255,255,0.3);}
  #zoom-close svg{width:20px;height:20px;}

  /* PDF LOADING */
  #pdf-loading{position:fixed;inset:0;z-index:500;background:rgba(250,247,242,0.92);display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;backdrop-filter:blur(8px);}
  #pdf-loading.visible{display:flex;}
  #pdf-loading .spin{width:32px;height:32px;border-width:3px;}
  #pdf-loading p{font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink2);}

  /* THEME BG CLASSES */
  .bg-editorial{background:#faf7f2;background-image:radial-gradient(rgba(26,21,18,0.04) 1px,transparent 1px);background-size:22px 22px;}
  .bg-minimalist{background:#f2ede4;background-image:linear-gradient(rgba(26,21,18,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(26,21,18,0.04) 1px,transparent 1px);background-size:24px 24px;}
  .bg-sunset{background:linear-gradient(135deg,#f59e0b,#ea580c,#4f46e5);}
  .bg-sage{background:linear-gradient(135deg,#d1fae5,#a7f3d0,#6ee7b7);}
  .bg-cyber{background:#0a0b0f;background-image:radial-gradient(rgba(20,30,60,0.8) 1px,transparent 1px);background-size:24px 24px;}
  .bg-cyber #board-main::after{color:rgba(255,255,255,0.03);}

  /* SCROLLBAR */
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

</style>

<script>
// ════════════════════════════════════════════════════════════
// CONSTANTS & CONFIG
// ════════════════════════════════════════════════════════════
const THEMES = [
  {id:'editorial',name:'Editorial Minimalista 🪶',bg:'bg-editorial',desc:'Papel crema con puntitos'},
  {id:'minimalist',name:'Estudio Técnico 📐',bg:'bg-minimalist',desc:'Cuadrícula suiza'},
  {id:'sunset',name:'Atardecer Cálido 🌅',bg:'bg-sunset',desc:'Degradado naranja-índigo'},
  {id:'sage',name:'Olivo Sereno 🌿',bg:'bg-sage',desc:'Verdes naturales'},
  {id:'cyber',name:'Cyberpunk Neon 🌌',bg:'bg-cyber',desc:'Oscuro & neón'}
];
const COLORS = [
  {name:'Blanco',bg:'#ffffff',border:'#e8e2d5',text:'#1a1512'},
  {name:'Naranja',bg:'#f27d26',border:'#d4691a',text:'#ffffff'},
  {name:'Crema',bg:'#fdfbf7',border:'#e8e2d5',text:'#2c2924'},
  {name:'Azul',bg:'#ebf1f5',border:'#c8d8e4',text:'#1e3040'},
  {name:'Verde',bg:'#edf2ed',border:'#d4dfd4',text:'#283c28'},
  {name:'Dorado',bg:'#d4a843',border:'#b8922a',text:'#ffffff'},
  {name:'Oscuro',bg:'#1a1512',border:'#3d3630',text:'#faf7f2'},
  {name:'Teal',bg:'#2a7c6f',border:'#1f5f55',text:'#ffffff'}
];
const EXPIRY_MS = 24*60*60*1000;

// ════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════
let boardId=null, isEditor=false, editKey=null;
let board=null, cards=[];
let layoutMode='grid';
let editingCardId=null;
let selectedColor=COLORS[0];
let currentImageBase64=null;
let shareTab='viewer';
let syncChannel=null;
let highestZ=10;

// ════════════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════════════
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function qrUrl(url,size=200){return `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(url)}`;}
function getRemainingTime(createdAt){
  const diff=new Date(createdAt).getTime()+EXPIRY_MS-Date.now();
  if(diff<=0)return{expired:true,text:'Expirado',pct:0};
  const h=Math.floor(diff/3600000), m=Math.floor((diff%3600000)/60000);
  return{expired:false,text:h>0?`${h}h ${m}m`:`${m}m`,pct:Math.max(0,Math.min(100,(diff/EXPIRY_MS)*100))};
}
function saveCards(){localStorage.setItem(`cards_${boardId}`,JSON.stringify(cards));}
function saveBoard(){
  const all=JSON.parse(localStorage.getItem('all_boards')||'{}');
  all[boardId]=board;
  localStorage.setItem('all_boards',JSON.stringify(all));
}
function saveRecent(b){
  let r=JSON.parse(localStorage.getItem('recent_boards')||'[]');
  r=[b,...r.filter(x=>x.id!==b.id)].slice(0,8);
  localStorage.setItem('recent_boards',JSON.stringify(r));
}
function compressImage(file,maxW=700,maxH=700,q=0.75){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.readAsDataURL(file);
    reader.onload=e=>{
      const img=new Image();
      img.src=e.target.result;
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>h){if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}}
        else{if(h>maxH){w=Math.round(w*maxH/h);h=maxH;}}
        const c=document.createElement('canvas');c.width=w;c.height=h;
        const ctx=c.getContext('2d');ctx.drawImage(img,0,0,w,h);
        res(c.toDataURL('image/jpeg',q));
      };
      img.onerror=rej;
    };
    reader.onerror=rej;
  });
}
function pruneExpired(){
  const now=Date.now();
  const before=cards.length;
  cards=cards.filter(c=>new Date(c.createdAt).getTime()+EXPIRY_MS>now);
  if(cards.length!==before)saveCards();
}

// ════════════════════════════════════════════════════════════
// LOBBY INIT
// ════════════════════════════════════════════════════════════
function buildThemeGrid(){
  const grid=document.getElementById('theme-grid');
  grid.innerHTML='';
  let sel='editorial';
  THEMES.forEach(t=>{
    const btn=document.createElement('button');
    btn.type='button';
    btn.className='theme-btn '+(t.id===sel?'active':'');
    btn.dataset.id=t.id;
    btn.innerHTML=`<div class="${t.bg}" style="position:absolute;inset:0;"></div><span style="position:relative;z-index:1;">${t.name}</span>`;
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.theme-btn').forEach(x=>x.classList.remove('active'));
      btn.classList.add('active');
      sel=t.id;
    });
    grid.appendChild(btn);
  });
  grid._getSel=()=>sel;
}
function buildRecents(){
  const list=document.getElementById('recents-list');
  const recents=JSON.parse(localStorage.getItem('recent_boards')||'[]');
  if(!recents.length){
    list.innerHTML='<div class="empty-recents">Tu historial está vacío. Los tableros que crees o visites aparecerán aquí.</div>';
    return;
  }
  list.innerHTML='<div class="recents-list">'+recents.map(b=>{
    const {expired,text}=getRemainingTime(b.createdAt);
    if(expired)return'';
    const keys=JSON.parse(localStorage.getItem('my_keys')||'{}');
    const hasEdit=!!keys[b.id];
    return `<div class="recent-item" onclick="openRecent('${b.id}')">
      <div>
        <div class="rname">${escHtml(b.title)}</div>
        <div style="font-size:10px;font-family:'DM Mono',monospace;opacity:0.5;margin-top:2px;">Expira en: ${text}</div>
      </div>
      ${hasEdit?'<div class="rbadge">EDITOR</div>':'<div class="rbadge" style="background:var(--teal)">VER</div>'}
    </div>`;
  }).join('')+'</div>';
}
function openRecent(id){
  const keys=JSON.parse(localStorage.getItem('my_keys')||'{}');
  const k=keys[id];
  const url=new URL(window.location.href);
  url.searchParams.set('boardId',id);
  if(k){url.searchParams.set('key',k);url.searchParams.set('role','editor');}
  else{url.searchParams.set('role','viewer');}
  window.location.href=url.toString();
}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

document.getElementById('create-form').addEventListener('submit',e=>{
  e.preventDefault();
  const title=document.getElementById('cf-title').value.trim()||'Mi Tablero';
  const desc=document.getElementById('cf-desc').value.trim()||'Espacio colaborativo de GmedranoTIC';
  const wallpaper=document.getElementById('theme-grid')._getSel();
  const id=uid();
  const key='edit-'+uid();
  const b={id,title,desc,wallpaper,editKey:key,createdAt:new Date().toISOString()};
  const all=JSON.parse(localStorage.getItem('all_boards')||'{}');
  all[id]=b;
  localStorage.setItem('all_boards',JSON.stringify(all));
  const keys=JSON.parse(localStorage.getItem('my_keys')||'{}');
  keys[id]=key;
  localStorage.setItem('my_keys',JSON.stringify(keys));
  saveRecent(b);
  const url=new URL(window.location.href);
  url.searchParams.set('boardId',id);url.searchParams.set('key',key);url.searchParams.set('role','editor');
  window.location.href=url.toString();
});

// ════════════════════════════════════════════════════════════
// ROUTER
// ════════════════════════════════════════════════════════════
function initRouter(){
  const params=new URLSearchParams(window.location.search);
  boardId=params.get('boardId');
  const role=params.get('role');
  const k=params.get('key');
  if(!boardId){showLobby();return;}
  const myKeys=JSON.parse(localStorage.getItem('my_keys')||'{}');
  const storedKey=myKeys[boardId];
  editKey=k||storedKey||null;
  isEditor=!!(role==='editor'||k||storedKey);
  loadBoard();
}
function showLobby(){
  document.getElementById('lobby').style.display='flex';
  document.getElementById('app').classList.remove('active');
  buildThemeGrid();
  buildRecents();
}
function loadBoard(){
  const all=JSON.parse(localStorage.getItem('all_boards')||'{}');
  board=all[boardId];
  if(!board){
    if(isEditor){
      board={id:boardId,title:'Tablero de GmedranoTIC',desc:'Tablero colaborativo temporal',wallpaper:'editorial',editKey:editKey||'key-'+uid(),createdAt:new Date().toISOString()};
      saveBoard();
    } else {
      alert('Este tablero no existe o ya expiró.');
      window.location.href=window.location.pathname;return;
    }
  }
  // Load & prune cards
  cards=JSON.parse(localStorage.getItem(`cards_${boardId}`)||'[]');
  pruneExpired();
  // Save to recents
  saveRecent(board);
  // Open sync channel
  syncChannel=new BroadcastChannel(`gmedrano-${boardId}`);
  syncChannel.onmessage=handleSync;
  // Render
  document.getElementById('lobby').style.display='none';
  document.getElementById('app').classList.add('active');
  renderHeader();
  renderBoard();
  startExpiryTimer();
  if(isEditor){
    document.getElementById('fab').style.display='flex';
    document.getElementById('theme-picker-wrap').style.display='block';
    buildThemeList();
  }
  // Prune every 30s
  setInterval(pruneExpired,30000);
  setInterval(renderBoard,30000);
}
function handleSync(e){
  const{type,payload}=e.data;
  if(type==='CARDS_UPDATE'){cards=payload;renderBoard();}
  else if(type==='BOARD_UPDATE'){board=payload;renderHeader();renderBoardBg();}
}
function broadcast(type,payload){syncChannel?.postMessage({type,payload});}

// ════════════════════════════════════════════════════════════
// RENDER HEADER
// ════════════════════════════════════════════════════════════
function renderHeader(){
  document.getElementById('hdr-board-title').textContent=board.title;
  const badge=document.getElementById('hdr-badge');
  badge.textContent=isEditor?'✍️ Editor':'👁 Lector';
  badge.className='hdr-badge '+(isEditor?'editor':'viewer');
  updateExpiry();
}
function updateExpiry(){
  if(!board)return;
  const{text,pct}=getRemainingTime(board.createdAt);
  document.getElementById('expiry-text').textContent=`Expira: ${text}`;
}
function startExpiryTimer(){setInterval(updateExpiry,60000);}
function renderBoardBg(){
  const main=document.getElementById('board-main');
  THEMES.forEach(t=>main.classList.remove(t.bg));
  const t=THEMES.find(x=>x.id===board.wallpaper)||THEMES[0];
  main.classList.add(t.bg);
}

// ════════════════════════════════════════════════════════════
// RENDER BOARD
// ════════════════════════════════════════════════════════════
function renderBoard(){
  renderBoardBg();
  const container=document.getElementById('cards-container');
  container.className=layoutMode==='grid'?'cards-grid':'cards-canvas';
  if(!cards.length){
    container.innerHTML=`<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      <h3>Tablero vacío</h3>
      <p>${isEditor?'Añade la primera nota con el botón inferior. Comparte el QR con tu equipo.':'Este tablero aún no tiene contenido.'}</p>
      ${isEditor?'<button onclick="openPostModal()">+ Añadir primera nota</button>':''}
    </div>`;
    return;
  }
  // Re-render preserving order
  const existing={};
  container.querySelectorAll('[data-card-id]').forEach(el=>{existing[el.dataset.cardId]=el;});
  const newIds=cards.map(c=>c.id);
  // Remove deleted
  Object.keys(existing).forEach(id=>{if(!newIds.includes(id))existing[id].remove();});
  cards.forEach((card,i)=>{
    if(existing[card.id]){
      // Update timer only
      const timerEl=existing[card.id].querySelector('.card-timer-text');
      if(timerEl){const{text}=getRemainingTime(card.createdAt);timerEl.textContent=`-${text}`;}
    } else {
      const el=createCardEl(card);
      container.appendChild(el);
    }
  });
}
function createCardEl(card){
  const{text:timeText}=getRemainingTime(card.createdAt);
  const c=card.color||{bg:'#ffffff',border:'#e8e2d5',text:'#1a1512'};
  const isJson=typeof c==='object';

  el.className='post-card card-enter'+(layoutMode==='canvas'?' canvas-mode':'');
  el.dataset.cardId=card.id;
  el.style.cssText=`background:${bg};border-color:${border};color:${textColor};`;
  if(layoutMode==='canvas'){
    el.style.left=`${card.x||10}%`;el.style.top=`${card.y||10}%`;el.style.zIndex=card.zIndex||10;
  }

  el.innerHTML=`
    <div class="card-top">
      <span class="card-author" title="${escHtml(card.username)}">✍️ ${escHtml(card.username||'Anónimo')}</span>
      <span class="card-timer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span class="card-timer-text">-${timeText}</span>
      </span>
    </div>
    ${card.imageUrl?`<div class="card-image" onclick="openZoom('${card.id}')"><img src="${card.imageUrl}" alt="imagen"/><span class="zoom-hint">🔍 Ampliar</span></div>`:''}
    <div class="card-body">
      ${card.title?`<div class="card-title">${escHtml(card.title)}</div>`:''}
      ${card.content?`<div class="card-text">${escHtml(card.content)}</div>`:''}
    </div>
    <div class="card-footer">
      <div class="card-actions">
        <button class="card-btn ${card.myLike?'liked':''}" onclick="likeCard('${card.id}',this)">
          <svg viewBox="0 0 24 24" fill="${card.myLike?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <span>${card.likes||0}</span>
        </button>
        <button class="card-btn" onclick="toggleComments('${card.id}',this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span>${(card.comments||[]).length}</span>
        </button>
      </div>
      ${isEditor?`<div class="card-editor-btns">
        <button class="card-editor-btn" title="Editar" onclick="editCard('${card.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
        <button class="card-editor-btn del" title="Eliminar" onclick="deleteCard('${card.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
      </div>`:''}
    </div>
    <div class="comments-panel" id="cp-${card.id}" style="display:none;">
      <div class="comments-list" id="cl-${card.id}">
        ${(card.comments||[]).map(cm=>`<div class="comment-item">
          <div class="comment-meta"><span>${escHtml(cm.username)}</span><span>${new Date(cm.createdAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span></div>
          <div class="comment-text">${escHtml(cm.content)}</div>
        </div>`).join('')||'<p style="text-align:center;font-size:12px;opacity:0.4;padding:10px;">Sin comentarios aún.</p>'}
      </div>
      <form class="comment-form" onsubmit="submitComment(event,'${card.id}')">
        <input type="text" placeholder="Tu comentario..." maxlength="300" required/>
        <button class="comment-submit" type="submit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
      </form>
    </div>
  `;
  // Canvas drag
  if(layoutMode==='canvas'&&isEditor)attachDrag(el,card.id);
  return el;
}

// ACTIONS
// ════════════════════════════════════════════════════════════
function likeCard(id,btn){
  const card=cards.find(c=>c.id===id);
  if(!card)return;
  card.likes=(card.likes||0)+1;
  card.myLike=true;
  saveCards();broadcast('CARDS_UPDATE',cards);
  btn.classList.add('liked');
  btn.querySelector('svg').setAttribute('fill','currentColor');
  btn.querySelector('span').textContent=card.likes;
}
function toggleComments(id){
  const panel=document.getElementById(`cp-${id}`);
  panel.style.display=panel.style.display==='none'?'block':'none';
}
function submitComment(e,id){
  e.preventDefault();
  const input=e.target.querySelector('input');
  const text=input.value.trim();if(!text)return;
  const card=cards.find(c=>c.id===id);if(!card)return;
  const nick=localStorage.getItem('board_nick')||'Colaborador';
  const comment={id:uid(),username:nick,content:text,createdAt:new Date().toISOString()};
  card.comments=[...(card.comments||[]),comment];
  saveCards();broadcast('CARDS_UPDATE',cards);
  // Append to DOM
  const list=document.getElementById(`cl-${id}`);
  const empty=list.querySelector('p');if(empty)empty.remove();
  const item=document.createElement('div');item.className='comment-item';
  item.innerHTML=`<div class="comment-meta"><span>${escHtml(nick)}</span><span>${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span></div><div class="comment-text">${escHtml(text)}</div>`;
  list.appendChild(item);list.scrollTop=list.scrollHeight;
  input.value='';
}
function deleteCard(id){
  if(!confirm('¿Eliminar esta nota?'))return;
  cards=cards.filter(c=>c.id!==id);
  saveCards();broadcast('CARDS_UPDATE',cards);
  const el=document.querySelector(`[data-card-id="${id}"]`);
  if(el)el.remove();
  if(!cards.length)renderBoard();
}
function editCard(id){
  editingCardId=id;
  const card=cards.find(c=>c.id===id);if(!card)return;
  openPostModal(card);
}

// ════════════════════════════════════════════════════════════
// DRAG (CANVAS MODE)
// ════════════════════════════════════════════════════════════
function attachDrag(el,id){
  let dragging=false,ox=0,oy=0;
  el.addEventListener('pointerdown',e=>{
    if(e.target.closest('button')||e.target.closest('input')||e.target.closest('textarea'))return;
    dragging=true;el.classList.add('dragging');
    const r=el.getBoundingClientRect();ox=e.clientX-r.left;oy=e.clientY-r.top;
    el.setPointerCapture(e.pointerId);highestZ++;el.style.zIndex=highestZ;
    e.preventDefault();
  });
  el.addEventListener('pointermove',e=>{
    if(!dragging)return;
    const p=el.parentElement.getBoundingClientRect();
    let x=((e.clientX-p.left-ox)/p.width)*100;
    let y=((e.clientY-p.top-oy)/p.height)*100;
    const wp=(el.offsetWidth/p.width)*100,hp=(el.offsetHeight/p.height)*100;
    x=Math.max(0,Math.min(100-wp,x));y=Math.max(0,Math.min(95-hp,y));
    el.style.left=x+'%';el.style.top=y+'%';
  });
  el.addEventListener('pointerup',e=>{
    if(!dragging)return;
    dragging=false;el.classList.remove('dragging');
    const x=parseFloat(el.style.left)||0,y=parseFloat(el.style.top)||0;
    const card=cards.find(c=>c.id===id);
    if(card){card.x=x;card.y=y;card.zIndex=highestZ;saveCards();broadcast('CARDS_UPDATE',cards);}
  });
}

// POST MODAL
// ════════════════════════════════════════════════════════════
function openPostModal(card=null){
  editingCardId=card?card.id:null;
  currentImageBase64=card?.imageUrl||null;
  document.getElementById('post-modal-title').textContent=card?'Editar Nota':'Nueva Nota';
  document.getElementById('post-btn-label').textContent=card?'Guardar':'Publicar';
  const savedNick=localStorage.getItem('board_nick')||'';
  document.getElementById('pf-username').value=card?card.username:savedNick;
  document.getElementById('pf-title').value=card?.title||'';
  document.getElementById('pf-content').value=card?.content||'';
  updateCounter();
  // Color picker
  buildColorPicker(card?.color||COLORS[0]);
  // Drop zone
  buildDropZone(card?.imageUrl||null);
  document.getElementById('post-modal').style.display='flex';
}
function closePostModal(){document.getElementById('post-modal').style.display='none';editingCardId=null;currentImageBase64=null;}
document.getElementById('post-modal-close').onclick=closePostModal;
document.getElementById('post-cancel').onclick=closePostModal;
document.getElementById('post-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closePostModal();});

document.getElementById('pf-content').addEventListener('input',updateCounter);
function updateCounter(){const v=document.getElementById('pf-content').value;document.getElementById('content-counter').textContent=`${v.length}/1200`;}

function buildColorPicker(current){
  selectedColor=typeof current==='object'?current:COLORS[0];
  const cp=document.getElementById('color-picker');
  cp.innerHTML=COLORS.map((c,i)=>`
    <div class="color-swatch ${selectedColor===c||selectedColor.bg===c.bg?'active':''}" 
      style="background:${c.bg};border-color:${c.border};" 
      title="${c.name}" 
      onclick="selectColor(${i})">
    </div>`).join('');
}
function selectColor(i){
  selectedColor=COLORS[i];
  document.querySelectorAll('.color-swatch').forEach((el,idx)=>el.classList.toggle('active',idx===i));
}
function buildDropZone(existing){
  const wrap=document.getElementById('drop-zone-wrap');
  if(existing){
    wrap.innerHTML=`<div class="img-preview"><img src="${existing}"/><button class="img-remove" type="button" onclick="removeImg()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button></div>`;
  } else {
    wrap.innerHTML=`<div class="drop-zone" id="drop-zone">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <p><strong>Haz clic</strong> o arrastra una imagen</p>
      <div class="formats">PNG · JPG · WEBP · GIF</div>
      <input type="file" accept="image/*" onchange="handleFile(this.files[0])"/>
    </div>`;
    const dz=document.getElementById('drop-zone');
    dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over');});
    dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
    dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');handleFile(e.dataTransfer.files[0]);});
  }
}
function removeImg(){currentImageBase64=null;buildDropZone(null);}
async function handleFile(file){
  if(!file||!file.type.startsWith('image/'))return;
  const wrap=document.getElementById('drop-zone-wrap');
  wrap.innerHTML='<div class="compressing"><div class="spin"></div><span>Optimizando imagen...</span></div>';
  try{
    currentImageBase64=await compressImage(file);
    buildDropZone(currentImageBase64);
  }catch(err){console.error(err);buildDropZone(null);}
}

document.getElementById('post-form').addEventListener('submit',e=>{
  e.preventDefault();
  const username=document.getElementById('pf-username').value.trim()||'Colaborador Anónimo';
  const title=document.getElementById('pf-title').value.trim();
  const content=document.getElementById('pf-content').value.trim();
  if(!content&&!currentImageBase64){alert('Añade texto o una imagen.');return;}
  localStorage.setItem('board_nick',username);
  if(editingCardId){
    const card=cards.find(c=>c.id===editingCardId);
    if(card){Object.assign(card,{username,title,content,imageUrl:currentImageBase64||card.imageUrl,color:selectedColor});}
  } else {
    highestZ++;
    const card={id:uid(),boardId,username,title,content,imageUrl:currentImageBase64||undefined,color:selectedColor,likes:0,x:Math.random()*50+10,y:Math.random()*40+10,zIndex:highestZ,comments:[],createdAt:new Date().toISOString()};
    cards.push(card);
  }
  saveCards();broadcast('CARDS_UPDATE',cards);
  closePostModal();renderBoard();
});

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>

function copyShareUrl(){
  const inp=document.getElementById('share-url-input');
  navigator.clipboard.writeText(inp.value).then(()=>{
    const btn=document.getElementById('copy-btn');
    btn.classList.add('copied');btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> ¡Copiado!';
    setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copiar';},2000);
  });
}
document.getElementById('share-btn').onclick=()=>{setShareTab('viewer');document.getElementById('share-modal').style.display='flex';};
document.getElementById('share-modal-close').onclick=()=>document.getElementById('share-modal').style.display='none';
document.getElementById('share-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.style.display='none';});

// ════════════════════════════════════════════════════════════
// ZOOM
// ════════════════════════════════════════════════════════════
function openZoom(id){
  const card=cards.find(c=>c.id===id);if(!card?.imageUrl)return;
  document.getElementById('zoom-img').src=card.imageUrl;
  document.getElementById('zoom-overlay').style.display='flex';
}
function closeZoom(){document.getElementById('zoom-overlay').style.display='none';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeZoom();});

// ════════════════════════════════════════════════════════════
// PDF EXPORT
// ════════════════════════════════════════════════════════════
document.getElementById('pdf-btn').onclick=async()=>{
  const target=document.getElementById('board-content');
  const loading=document.getElementById('pdf-loading');
  loading.classList.add('visible');
  try{
    const canvas=await html2canvas(target,{scale:2,useCORS:true,backgroundColor:'#faf7f2',scrollX:0,scrollY:0,windowWidth:target.scrollWidth,windowHeight:target.scrollHeight});
    const w=canvas.width,h=canvas.height;
    const{jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'landscape',unit:'px',format:[w,h]});
    pdf.addImage(canvas,'PNG',0,0,w,h);
    pdf.save(`Tablero_GmedranoTIC_${board.title||'export'}.pdf`);
  }catch(err){console.error(err);alert('Error al generar el PDF. Inténtalo de nuevo.');}
  finally{loading.classList.remove('visible');}
};

// ════════════════════════════════════════════════════════════
// FULLSCREEN
// ════════════════════════════════════════════════════════════
document.getElementById('fs-btn').onclick=()=>{
  const el=document.getElementById('app');
  if(!document.fullscreenElement){
    el.requestFullscreen?.().catch(()=>{});
  } else {
    document.exitFullscreen?.();
  }
};
document.addEventListener('fullscreenchange',()=>{
  const icon=document.getElementById('fs-icon');
  if(document.fullscreenElement){
    icon.innerHTML='<path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>';
  } else {
    icon.innerHTML='<path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>';
  }
});
